services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai-house-backend
    environment:
      DATABASE_URL: sqlite:////app/data/house_history.db
    ports:
      - "8000:8000"
    volumes:
      - house-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ai-house-frontend
    environment:
      API_URL: http://backend:8000
      REQUEST_TIMEOUT: "15"
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  house-data:
